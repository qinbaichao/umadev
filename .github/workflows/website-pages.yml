name: Deploy website to GitHub Pages

on:
  push:
    branches: [public-main, main]
    paths:
      - "umadev-website/**"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: umadev-website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: umadev-website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_REPO: umadev
          GITHUB_PAGES_DOMAIN: umadev.goder.ai
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: umadev-website/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
